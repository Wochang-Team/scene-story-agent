name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'dockerfile'
      - '.github/**'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.set-env.outputs.project_name }}
      data_tag: ${{ steps.set-env.outputs.data_tag }}
      bucket_name: ${{ steps.set-env.outputs.bucket_name }}
      image_name: ${{ steps.set-env.outputs.image_name }}
      app_name: ${{ steps.set-env.outputs.app_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Set Environment Variables
        id: set-env
        run: |
          DATE=$(date +%Y%m%d%H%M%S)

          PROJECT_NAME="scene-story"
          BUCKET_NAME="be"
          IMAGE_NAME="${PROJECT_NAME}/${BUCKET_NAME}"
          APP_NAME="${PROJECT_NAME}-${BUCKET_NAME}"

          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "data_tag=$DATE" >> $GITHUB_OUTPUT
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

  build_image:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load Env from Vault
        id: vault
        uses: ./.github/actions/vault-env
        with:
          vault_addr: ${{ secrets.VAULT_ADDR }}
          vault_token: ${{ secrets.VAULT_TOKEN }}

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.vault.outputs.registry }}
          username: ${{ steps.vault.outputs.harbor_username }}
          password: ${{ steps.vault.outputs.harbor_password }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: ./dockerfile
          push: true
          tags: ${{ steps.vault.outputs.registry }}/${{ needs.prepare.outputs.image_name}}:${{ needs.prepare.outputs.data_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=${{ needs.prepare.outputs.project_name }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.data_tag }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.authors=${{ github.actor }}
            maintainer=WooStack
            environment=production
            label=${{ needs.prepare.outputs.bucket_name }}
          build-args: |
            APP_NAME=${{ needs.prepare.outputs.app_name }}
            ENVIRONMENT=production

  notify-discord:
    needs: [prepare, build_image]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Load Env from Vault
        id: vault
        uses: ./.github/actions/vault-env
        with:
          vault_addr: ${{ secrets.VAULT_ADDR }}
          vault_token: ${{ secrets.VAULT_TOKEN }}

      - name: Notify to Discord
        uses: ./.github/actions/notify
        with:
          discord_webhook_url: ${{ steps.vault.outputs.discord_webhook_url }}
          registry: ${{ steps.vault.outputs.registry }}
          project_name: ${{ needs.prepare.outputs.project_name }}
          bucket_name: ${{ needs.prepare.outputs.bucket_name }}
          data_tag: ${{ needs.prepare.outputs.data_tag }}

  deploy:
    needs: [prepare, build_image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load Env from Vault
        id: vault
        uses: ./.github/actions/vault-env
        with:
          vault_addr: ${{ secrets.VAULT_ADDR }}
          vault_token: ${{ secrets.VAULT_TOKEN }}

      - name: Checkout woostack-gitops repository
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.vault.outputs.repository }}
          ref: main
          token: ${{ steps.vault.outputs.action_token }}
          path: ${{ steps.vault.outputs.path }}

      - name: Update Kubernetes manifest
        run: |
          cd ${{ steps.vault.outputs.path }} 

          echo "${{ steps.vault.outputs.registry }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.data_tag }}"
          echo "./apps/${{ needs.prepare.outputs.project_name }}/${{ needs.prepare.outputs.bucket_name }}/deployment.yaml"

          sed -i "s|image: ${{ steps.vault.outputs.registry }}/${{ needs.prepare.outputs.image_name }}:.*|image: ${{ steps.vault.outputs.registry }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.data_tag }}|" ./apps/${{ needs.prepare.outputs.project_name }}/${{ needs.prepare.outputs.bucket_name }}/deployment.yaml

      - name: Commit and push changes
        run: |
          cd ${{ steps.vault.outputs.path }}
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add ./apps/${{ needs.prepare.outputs.project_name }}/${{ needs.prepare.outputs.bucket_name }}/deployment.yaml
          git commit -m "chore: Update apps/${{ needs.prepare.outputs.project_name }}/${{ needs.prepare.outputs.bucket_name }}/deployment.yaml"
          git push
