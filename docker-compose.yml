services:
  postgres:
    build:
      context: .
      dockerfile: infra/postgres/Dockerfile
    image: scene-story-agent-postgres:18.4-pgvector
    container_name: scene-story-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql/18/docker
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: scene-story-agent-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis8_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres18_data:
  redis8_data:
